<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MLS 113 Quiz - OlamGeorg</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:15px;color:#fff;transition:background 0.3s}
    .container{max-width:700px;margin:0 auto;background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border-radius:24px;padding:25px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
    h1{font-size:26px;margin-bottom:15px;text-align:center;font-weight:700}
    .mode-toggle{display:flex;gap:10px;margin-bottom:20px}
    .mode-toggle button{flex:1;padding:14px;font-size:16px;border:2px solid rgba(255,255,255,0.3);border-radius:12px;background:transparent;color:#fff;font-weight:600;cursor:pointer}
    .mode-toggle button.active{background:#fff;color:#667eea;border-color:#fff}
    .progress{height:10px;background:rgba(255,255,255,0.2);border-radius:10px;margin:20px 0;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,#ffd700,#ffed4e);transition:width 0.3s;border-radius:10px}
    .q-count{font-size:16px;opacity:0.9;margin-bottom:10px}
    input[type="color"]{width:100%;height:45px;border:none;border-radius:12px;margin:15px 0;cursor:pointer}
    .question{font-size:20px;margin:25px 0;font-weight:600;line-height:1.4}
    .option{padding:18px;background:rgba(255,255,255,0.15);margin:12px 0;border-radius:14px;cursor:pointer;font-size:18px;transition:all 0.2s;border:2px solid transparent}
    .option:active{transform:scale(0.98)}
    .option.selected{background:#667eea;border-color:#fff;transform:scale(1.02)}
