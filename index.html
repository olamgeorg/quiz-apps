<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathology Quiz - 113 Questions</title>
<style>
* {box-sizing: border-box; margin: 0; padding: 0;}
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 800px;
  width: 100%;
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
h1 {
  text-align: center;
  color: #667eea;
  margin-bottom: 10px;
  font-size: 28px;
}
.subtitle {
  text-align: center;
  color: #888;
  margin-bottom: 30px;
  font-size: 14px;
}
.progress {
  text-align: center;
  color: #999;
  margin-bottom: 20px;
  font-size: 14px;
}
.question {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 25px;
  color: #333;
  line-height: 1.5;
}
.options {
  display: grid;
  gap: 12px;
  margin-bottom: 25px;
}
.option {
  padding: 16px 20px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  cursor: pointer;
  background: white;
  transition: all 0.2s;
  font-size: 16px;
}
.option:hover {
  background: #f8f9ff;
  border-color: #667eea;
  transform: translateX(5px);
}
.option:active {
  transform: scale(0.98);
}
.option.selected {
  background: #667eea;
  border-color: #667eea;
  color: white;
  font-weight: bold;
}
.btn {
  background: #667eea;
  color: white;
  border: none;
  padding: 14px 40px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  width: 100%;
  transition: 0.2s;
}
.btn:hover:not(:disabled) {
  background: #5568d3;
  transform: translateY(-2px);
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.score {
  font-size: 24px;
  text-align: center;
  margin-top: 25px;
  font-weight: bold;
  color: #667eea;
}
</style>
</head>
<body>
<div class="container">
<h1>Pathology Quiz</h1>
<p class="subtitle">113 Questions - Test Your Knowledge</p>
<div id="quiz">
<div class="progress" id="progress">Question 1 of 113</div>
<div class="question" id="question">Loading...</div>
<div class="options" id="options"></div>
<button class="btn" id="nextBtn" disabled>Next Question</button>
<div class="score" id="score"></div>
</div>
</div>

<script type="module">
import { quizData } from './questions.js';

let currentQ = 0;
let score = 0;
let selected = null;

const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const nextBtn = document.getElementById('nextBtn');
const scoreEl = document.getElementById('score');
const progressEl = document.getElementById('progress');

function loadQuestion() {
  selected = null;
  nextBtn.disabled = true;
  const q = quizData[currentQ];
  progressEl.textContent = `Question ${currentQ+1} of ${quizData.length}`;
  questionEl.textContent = q.question;
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = `${String.fromCharCode(65+i)}. ${opt}`;
    div.onclick = () => selectOption(div, i);
    optionsEl.appendChild(div);
  });
}

function selectOption(el, i) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selected = i;
  nextBtn.disabled = false;
}

nextBtn.onclick = () => {
  if(selected === quizData[currentQ].answer) score++;
  currentQ++;
  if(currentQ < quizData.length) {
    loadQuestion();
  } else {
    showScore();
  }
};

function showScore() {
  questionEl.textContent = 'Quiz Complete! 🎉';
  optionsEl.innerHTML = '';
  nextBtn.style.display = 'none';
  progressEl.textContent = 'Final Result';
  const percent = Math.round((score/quizData.length)*100);
  scoreEl.innerHTML = `Your Score: ${score}/${quizData.length}<br><span style="font-size:18px;color:#666">${percent}%</span>`;
}

loadQuestion();
</script>
</body>
</html>
